<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="shortcut icon" href="favicon.jpg" type="image/jpg">
    <title>Koxxh Sound</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #070000, #2b0202);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
            position: relative;
        }

        .upload-btn {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            background: rgba(145, 55, 3, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 222, 222, 0.2);
            border-radius: 60px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #f0f0ff;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        .upload-btn:hover {
            background: rgba(228, 4, 4, 0.8);
            border-color: rgba(255, 200, 220, 0.5);
            transform: scale(1.02);
        }

        .site-title {
            text-align: center;
            margin-bottom: 1.5rem;
            width: 100%;
        }
        .site-title h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffc3c3, #ff8a8a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(255,80,80,0.3);
            letter-spacing: 2px;
        }

        .music-core {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 460px;
        }

        .card-container {
            perspective: 1200px;
            margin-bottom: 1.8rem;
        }
        .card {
            width: 300px;
            height: 200px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.55s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            border-radius: 28px;
            box-shadow: 0 25px 35px -12px rgba(0,0,0,0.5);
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            backface-visibility: hidden;
            background: rgba(35, 15, 15, 0.55);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 1rem;
        }
        .front {
            background: linear-gradient(135deg, #1f1010, #2f1f1b);
        }
        .back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, #2c1a1a, #3d2525);
        }
        .card h2 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(120deg, #fff, #c0b9ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .card p {
            font-size: 0.85rem;
            opacity: 0.8;
        }
        .artist-label {
            font-size: 0.7rem;
            margin-top: 6px;
            color: #bbbbff;
        }

        .player-controls {
            width: 100%;
            background: rgba(28, 12, 12, 0.7);
            backdrop-filter: blur(14px);
            border-radius: 32px;
            padding: 16px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 1.8rem;
        }
        .timeline-container {
            width: 100%;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            font-family: monospace;
            color: #ccccee;
            margin-bottom: 8px;
        }
        .progress-bar-bg {
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            height: 5px;
            cursor: pointer;
            transition: height 0.2s;
        }
        .progress-bar-bg:hover {
            height: 7px;
        }
        .progress-fill {
            background: linear-gradient(90deg, #f85e7a, #dd2e5f);
            width: 0%;
            height: 100%;
            border-radius: 20px;
        }
        .song-label {
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            color: #e2e2ff;
            margin: 12px 0 6px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-actions {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 12px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            color: #fceeee;
            font-size: 1.3rem;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        .nav-btn:hover {
            background: rgba(255,80,120,0.6);
            transform: scale(1.03);
        }
        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .vol-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            color: #fceeee;
            font-size: 1.2rem;
            padding: 5px 12px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        .vol-btn:hover {
            background: rgba(200, 100, 100, 0.6);
        }
        .volume-level {
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-family: monospace;
            color: #ffd966;
            min-width: 55px;
            text-align: center;
        }

        .playlist-section {
            width: 100%;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 1rem 0.8rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0 12px 12px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            margin-bottom: 12px;
        }
        .playlist-header h3 {
            font-size: 1rem;
            color: #ddd9ff;
        }
        .playlist-count {
            font-size: 0.7rem;
            background: #452a2a;
            padding: 2px 8px;
            border-radius: 30px;
            color: #bbb;
        }
        #playlist-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 260px;
            overflow-y: auto;
            padding-right: 6px;
        }
        .playlist-item {
            background: rgba(48, 25, 25, 0.7);
            border-radius: 60px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .playlist-item.active {
            background: linear-gradient(95deg, #c44569, #9b2d4c);
            border-left: 4px solid #ffb7c5;
        }
        .playlist-item:hover {
            background: rgba(160, 80, 80, 0.6);
            transform: translateX(5px);
        }
        .song-info {
            flex: 1;
        }
        .song-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #f2f2ff;
        }
        .song-artist {
            font-size: 0.7rem;
            color: #b9b9e6;
        }
        .delete-btn {
            background: rgba(0,0,0,0.5);
            border: none;
            color: #ffaaaa;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            margin-left: 8px;
        }
        .delete-btn:hover {
            background: #a1223a;
            color: white;
            transform: scale(1.05);
        }

        .modal-overlay, .confirm-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .upload-modal, .confirm-modal {
            background: #241212e6;
            backdrop-filter: blur(20px);
            width: 90%;
            max-width: 380px;
            border-radius: 48px;
            padding: 28px 24px;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
        }
        .confirm-modal {
            text-align: center;
        }
        .confirm-modal p {
            margin: 20px 0;
            font-size: 1.1rem;
        }
        .confirm-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
        }
        .confirm-buttons button {
            padding: 8px 24px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            background: #5b2f2f;
            color: white;
        }
        .confirm-buttons button:first-child {
            background: #c44569;
        }
        .upload-modal h3 {
            font-size: 1.6rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .upload-modal input, .upload-modal .file-label {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            background: rgba(55, 30, 30, 0.8);
            border: 1px solid #704a4a;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
        }
        .file-label {
            display: block;
            text-align: center;
            background: #252b44;
            cursor: pointer;
        }
        #audioFile {
            display: none;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            background: #5b2f2f;
            color: white;
        }
        .modal-buttons button:first-child {
            background: #c44569;
        }
        .error-msg {
            color: #ffa098;
            font-size: 0.7rem;
            margin-top: 6px;
            text-align: center;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #2e1e1e; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c44569; border-radius: 10px; }
    </style>
</head>
<body>
<button class="upload-btn" id="openUploadBtn">➕ Upload</button>

<div class="music-core">
    <div class="site-title">
        <h1>koxxh sound</h1>
    </div>

    <div class="card-container">
        <div class="card" id="musicCard">
            <div class="card-face front">
                <h2>🎵 Play</h2>
                <p>click to play</p>
            </div>
            <div class="card-face back" id="cardBack">
                <h2 id="backSongName">—</h2>
                <p id="backArtistName">—</p>
                <div class="artist-label">♫ now playing</div>
            </div>
        </div>
    </div>

    <div class="player-controls">
        <div class="timeline-container">
            <div class="time-info">
                <span id="currentTime">00:00</span>
                <span id="duration">00:00</span>
            </div>
            <div class="progress-bar-bg" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        <div class="song-label" id="songLabel">🎵 No tracks — upload a song</div>
        <div class="player-actions">
            <button class="nav-btn" id="prevBtn">⏮</button>
            <button class="nav-btn" id="nextBtn">⏭</button>
        </div>
        <div class="volume-control">
            <button class="vol-btn" id="volDownBtn">🔉</button>
            <span class="volume-level" id="volumePercent">70%</span>
            <button class="vol-btn" id="volUpBtn">🔊</button>
        </div>
    </div>

    <div class="playlist-section">
        <div class="playlist-header">
            <h3>Musics 📁</h3>
            <span class="playlist-count" id="playlistCount">0 tracks</span>
        </div>
        <ul id="playlist-list"></ul>
    </div>
</div>

<div id="uploadModal" class="modal-overlay">
    <div class="upload-modal">
        <h3>✨ Upload Music</h3>
        <input type="text" id="songNameInput" placeholder="Song name *" autocomplete="off">
        <input type="text" id="artistNameInput" placeholder="Artist name *" autocomplete="off">
        <label class="file-label" for="audioFile">🎵 Choose audio file</label>
        <input type="file" id="audioFile" accept="audio/*">
        <div id="modalError" class="error-msg"></div>
        <div class="modal-buttons">
            <button id="confirmUploadBtn">Add</button>
            <button id="cancelModalBtn">Cancel</button>
        </div>
    </div>
</div>

<div id="confirmModal" class="confirm-overlay">
    <div class="confirm-modal">
        <p id="confirmMessage">Are you sure you want to delete this song?</p>
        <div class="confirm-buttons">
            <button id="confirmYesBtn">Yes</button>
            <button id="confirmNoBtn">No</button>
        </div>
    </div>
</div>

<audio id="hiddenAudio" preload="auto" style="display: none;"></audio>

<script>
    (function() {
        const DB_NAME = "MelodyVaultDB";
        const DB_VERSION = 1;
        const STORE_NAME = "songs";

        let db = null;
        let playlist = [];
        let currentIndex = -1;
        let isFlipped = false;
        let currentBlobUrl = null;
        let currentLoadedSongId = null;
        let pendingDeleteIndex = null;

        const audio = document.getElementById('hiddenAudio');
        const card = document.getElementById('musicCard');
        const progressBg = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeSpan = document.getElementById('currentTime');
        const durationSpan = document.getElementById('duration');
        const songLabelDiv = document.getElementById('songLabel');
        const backSongName = document.getElementById('backSongName');
        const backArtistName = document.getElementById('backArtistName');
        const playlistContainer = document.getElementById('playlist-list');
        const playlistCountSpan = document.getElementById('playlistCount');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const volDownBtn = document.getElementById('volDownBtn');
        const volUpBtn = document.getElementById('volUpBtn');
        const volumePercentSpan = document.getElementById('volumePercent');

        const modal = document.getElementById('uploadModal');
        const openBtn = document.getElementById('openUploadBtn');
        const confirmBtn = document.getElementById('confirmUploadBtn');
        const cancelBtn = document.getElementById('cancelModalBtn');
        const songNameInput = document.getElementById('songNameInput');
        const artistNameInput = document.getElementById('artistNameInput');
        const audioFileInput = document.getElementById('audioFile');
        const modalError = document.getElementById('modalError');

        const confirmModal = document.getElementById('confirmModal');
        const confirmMessage = document.getElementById('confirmMessage');
        const confirmYes = document.getElementById('confirmYesBtn');
        const confirmNo = document.getElementById('confirmNoBtn');

        let currentVolume = 0.7;
        audio.volume = currentVolume;
        volumePercentSpan.innerText = `${Math.round(currentVolume * 100)}%`;

        function setVolume(value) {
            let newVol = Math.min(1, Math.max(0, value));
            currentVolume = newVol;
            audio.volume = currentVolume;
            volumePercentSpan.innerText = `${Math.round(currentVolume * 100)}%`;
        }

        function increaseVolume() { setVolume(currentVolume + 0.1); }
        function decreaseVolume() { setVolume(currentVolume - 0.1); }

        volUpBtn.addEventListener('click', increaseVolume);
        volDownBtn.addEventListener('click', decreaseVolume);

        function formatTime(sec) {
            if (isNaN(sec)) return '00:00';
            const mins = Math.floor(sec / 60);
            const seconds = Math.floor(sec % 60);
            return `${mins.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function revokeCurrentBlobUrl() {
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = null;
            }
        }

        function loadSong(index, preserveTime = false) {
            if (index < 0 || index >= playlist.length) return false;
            const song = playlist[index];
            if (!song || !song.blob) return false;

            const wasPlaying = !audio.paused;
            if (!preserveTime || currentLoadedSongId !== song.id) {
                audio.pause();
                revokeCurrentBlobUrl();
                const newUrl = URL.createObjectURL(song.blob);
                currentBlobUrl = newUrl;
                audio.src = newUrl;
                audio.load();
                currentLoadedSongId = song.id;
                audio.onloadedmetadata = () => {
                    durationSpan.innerText = formatTime(audio.duration);
                    if (wasPlaying && isFlipped) {
                        audio.play().catch(e => console.log(e));
                    }
                };
                if (wasPlaying && isFlipped) {
                    audio.play().catch(e => console.log(e));
                }
            } else {
                if (wasPlaying && isFlipped) {
                    audio.play().catch(e => console.log(e));
                }
            }
            updateCurrentSongUI();
            renderPlaylist();
            return true;
        }

        function updateCurrentSongUI() {
            if (currentIndex === -1 || !playlist[currentIndex]) {
                songLabelDiv.innerText = '🎵 No tracks — upload a song';
                backSongName.innerText = '—';
                backArtistName.innerText = '—';
                return;
            }
            const song = playlist[currentIndex];
            songLabelDiv.innerText = `🎵 ${song.name} - ${song.artist}`;
            backSongName.innerText = song.name.length > 20 ? song.name.slice(0,18)+'..' : song.name;
            backArtistName.innerText = song.artist;
        }

        function nextTrack() {
            if (playlist.length === 0) return;
            let newIndex = (currentIndex + 1) % playlist.length;
            currentIndex = newIndex;
            loadSong(currentIndex, false);
            if (isFlipped) audio.play().catch(e => console.log(e));
        }

        function prevTrack() {
            if (playlist.length === 0) return;
            let newIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            currentIndex = newIndex;
            loadSong(currentIndex, false);
            if (isFlipped) audio.play().catch(e => console.log(e));
        }

        function showConfirmDialog(songName, index) {
            pendingDeleteIndex = index;
            confirmMessage.innerText = `Are you sure you want to delete "${songName}"?`;
            confirmModal.style.display = 'flex';
        }

        function closeConfirmDialog() {
            confirmModal.style.display = 'none';
            pendingDeleteIndex = null;
        }

        function deleteSongAtIndex(indexToDelete) {
            if (indexToDelete < 0 || indexToDelete >= playlist.length) return;
            const songToDelete = playlist[indexToDelete];
            if (currentLoadedSongId === songToDelete.id) {
                revokeCurrentBlobUrl();
                currentLoadedSongId = null;
                audio.pause();
                audio.src = '';
            }
            playlist.splice(indexToDelete, 1);
            savePlaylistToDB();
            if (playlist.length === 0) {
                currentIndex = -1;
                updateCurrentSongUI();
                renderPlaylist();
                return;
            }
            if (indexToDelete === currentIndex) {
                if (indexToDelete >= playlist.length) currentIndex = playlist.length - 1;
                else currentIndex = indexToDelete;
                if (currentIndex >= 0) loadSong(currentIndex, false);
            } else if (indexToDelete < currentIndex) {
                currentIndex--;
                updateCurrentSongUI();
            }
            renderPlaylist();
        }

        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            playlist.forEach((song, idx) => {
                const li = document.createElement('li');
                li.className = 'playlist-item';
                if (idx === currentIndex) li.classList.add('active');

                const infoDiv = document.createElement('div');
                infoDiv.className = 'song-info';
                infoDiv.innerHTML = `
                    <div class="song-title">${escapeHtml(song.name)}</div>
                    <div class="song-artist">${escapeHtml(song.artist)}</div>
                `;
                li.appendChild(infoDiv);

                const delBtn = document.createElement('button');
                delBtn.innerHTML = '🗑️';
                delBtn.className = 'delete-btn';
                delBtn.title = 'Delete song';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showConfirmDialog(song.name, idx);
                });
                li.appendChild(delBtn);

                li.addEventListener('click', (e) => {
                    if (e.target.classList && e.target.classList.contains('delete-btn')) return;
                    if (currentIndex !== idx) {
                        currentIndex = idx;
                        loadSong(currentIndex, false);
                        if (!isFlipped) {
                            card.classList.add('flipped');
                            isFlipped = true;
                            audio.play().catch(e => console.log(e));
                        } else {
                            audio.play().catch(e => console.log(e));
                        }
                    } else {
                        if (audio.paused && isFlipped) audio.play();
                        else if (!audio.paused && isFlipped) audio.pause();
                        else if (!isFlipped) {
                            card.classList.add('flipped');
                            isFlipped = true;
                            if (currentLoadedSongId !== playlist[currentIndex]?.id) {
                                loadSong(currentIndex, false);
                            }
                            audio.play().catch(e => console.log(e));
                        }
                    }
                });
                playlistContainer.appendChild(li);
            });
            playlistCountSpan.innerText = `${playlist.length} track${playlist.length !== 1 ? 's' : ''}`;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }

        function savePlaylistToDB() {
            if (!db) return;
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            store.clear();
            for (let song of playlist) {
                store.put({
                    id: song.id,
                    name: song.name,
                    artist: song.artist,
                    blob: song.blob
                });
            }
        }

        function addSongToPlaylist(name, artist, fileBlob) {
            const id = Date.now() + "_" + Math.random().toString(36);
            const newSong = {
                id: id,
                name: name.trim(),
                artist: artist.trim(),
                blob: fileBlob,
            };
            playlist.push(newSong);
            savePlaylistToDB();
            renderPlaylist();

            if (playlist.length === 1) {
                currentIndex = 0;
                loadSong(currentIndex, false);
            } else {
                renderPlaylist();
            }
            if (currentIndex === -1 && playlist.length > 0) {
                currentIndex = 0;
                loadSong(currentIndex, false);
            }
        }

        function loadPlaylistFromDB() {
            if (!db) return Promise.reject("DB not ready");
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => {
                    const storedSongs = request.result;
                    playlist = storedSongs.map(s => ({
                        id: s.id,
                        name: s.name,
                        artist: s.artist,
                        blob: s.blob,
                    }));
                    if (playlist.length > 0) {
                        currentIndex = 0;
                        loadSong(currentIndex, false);
                    } else {
                        currentIndex = -1;
                        updateCurrentSongUI();
                        renderPlaylist();
                    }
                    resolve();
                };
                request.onerror = (e) => reject(e);
            });
        }

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = (e) => reject(e);
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve();
                };
                request.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: "id" });
                    }
                };
            });
        }

        function openModal() {
            modal.style.display = 'flex';
            songNameInput.value = '';
            artistNameInput.value = '';
            audioFileInput.value = '';
            modalError.innerText = '';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        function handleUpload() {
            const songName = songNameInput.value.trim();
            const artist = artistNameInput.value.trim();
            const file = audioFileInput.files[0];
            if (!file) {
                modalError.innerText = '❌ Please select an audio file.';
                return;
            }
            if (!file.type.includes('audio')) {
                modalError.innerText = '❌ Only audio files allowed (mp3, wav, etc)';
                return;
            }
            if (songName === "") {
                modalError.innerText = '❌ Please enter song name.';
                return;
            }
            if (artist === "") {
                modalError.innerText = '❌ Please enter artist name.';
                return;
            }
            addSongToPlaylist(songName, artist, file);
            closeModal();
        }

        card.addEventListener('click', () => {
            if (!isFlipped) {
                if (playlist.length === 0) {
                    alert("No songs! Upload a track first 🎶");
                    return;
                }
                if (currentIndex === -1 && playlist.length) currentIndex = 0;
                if (currentIndex !== -1) {
                    const currentSong = playlist[currentIndex];
                    if (currentLoadedSongId !== currentSong.id) {
                        loadSong(currentIndex, false);
                    }
                    audio.play().catch(e => console.log(e));
                }
                card.classList.add('flipped');
                isFlipped = true;
            } else {
                card.classList.remove('flipped');
                isFlipped = false;
                audio.pause();
            }
        });

        progressBg.addEventListener('click', (e) => {
            if (!audio.duration || !isFinite(audio.duration)) return;
            const rect = progressBg.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
            if (audio.paused && isFlipped) {
                audio.play().catch(e => console.log(e));
            }
        });

        audio.addEventListener('timeupdate', () => {
            if (audio.duration && isFinite(audio.duration)) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = percent + '%';
                currentTimeSpan.innerText = formatTime(audio.currentTime);
            }
        });

        audio.addEventListener('ended', () => {
            if (playlist.length > 1) {
                nextTrack();
            } else {
                progressFill.style.width = '0%';
                currentTimeSpan.innerText = '00:00';
            }
        });

        prevBtn.addEventListener('click', () => {
            if (playlist.length === 0) return;
            prevTrack();
            if (!isFlipped) {
                card.classList.add('flipped');
                isFlipped = true;
                audio.play().catch(e => console.log(e));
            }
        });

        nextBtn.addEventListener('click', () => {
            if (playlist.length === 0) return;
            nextTrack();
            if (!isFlipped) {
                card.classList.add('flipped');
                isFlipped = true;
                audio.play().catch(e => console.log(e));
            }
        });

        openBtn.addEventListener('click', openModal);
        confirmBtn.addEventListener('click', handleUpload);
        cancelBtn.addEventListener('click', closeModal);
        window.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
            if (e.target === confirmModal) closeConfirmDialog();
        });

        confirmYes.addEventListener('click', () => {
            if (pendingDeleteIndex !== null) {
                deleteSongAtIndex(pendingDeleteIndex);
                closeConfirmDialog();
            }
        });
        confirmNo.addEventListener('click', closeConfirmDialog);

        async function startApp() {
            await initDB();
            await loadPlaylistFromDB();
            if (playlist.length === 0) {
                renderPlaylist();
                updateCurrentSongUI();
            }
        }
        startApp().catch(e => console.warn("DB init error", e));
    })();
</script>
</body>
</html>
